<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Арман Геморой · Арман құлдықта</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik+Vinyl&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0c1a 0%, #1a1f2f 100%);
      min-height: 100vh;
      font-family: 'Fredoka One', cursive, sans-serif;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .meme-world {
      max-width: 1300px;
      width: 100%;
      background: rgba(255, 240, 200, 0.07);
      backdrop-filter: blur(3px);
      border-radius: 70px 70px 40px 40px;
      padding: 30px 30px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #f7d44a inset;
      border: 1px solid #f8e47b;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 18px 40px;
      margin-bottom: 40px;
      background: #141a28;
      padding: 20px 35px;
      border-radius: 100px;
      box-shadow: 0 8px 0 #0a0c14, 0 12px 30px rgba(0,0,0,0.5);
      border-bottom: 4px solid #f9d342;
    }

    .header h1 {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 3.8rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #feda75, #ffb347, #fd7e14);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px #ffae42, 0 0 6px #ff7b00;
      transform: rotate(-1deg);
      text-align: center;
    }

    .header .sub-meme {
      background: #232b3b;
      padding: 12px 30px;
      border-radius: 60px;
      color: #ffeeaa;
      font-size: 1.7rem;
      border: 2px dashed #f1c40f;
      box-shadow: 0 0 0 3px #1f2636;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .header .sub-meme span {
      font-size: 2.2rem;
    }

    /* новая строка "Арман құлдықта" */
    .armand-kuldykta {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b, #ff2d2d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px #ff2222, 0 4px 0 #4a0f0f;
      letter-spacing: 4px;
      text-align: center;
      margin: -10px 0 25px 0;
      padding: 10px 20px;
      background-color: #0f1422;
      border-radius: 80px;
      display: inline-block;
      border: 3px solid #f1c40f;
      box-shadow: 0 0 0 4px #1f1f2e;
    }

    .meme-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px 20px;
      justify-content: center;
      margin: 25px 0 20px;
    }

    .meme-card {
      background: #1e2537;
      border-radius: 40px 20px 40px 20px;
      padding: 14px 10px 18px;
      box-shadow: 0 12px 0 #0e121d, 0 10px 25px rgba(0,0,0,0.7);
      transition: 0.15s ease;
      border: 2px solid #f1c40f;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      backdrop-filter: blur(2px);
    }

    .meme-card:hover {
      transform: scale(1.02) translateY(-5px);
      border-color: #ffdd55;
      box-shadow: 0 14px 0 #0e121d, 0 20px 30px #000000aa;
    }

    .meme-card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 28px 12px 28px 12px;
      background: #0f1420;
      border: 3px solid #f9e074;
      transition: 0.2s;
      display: block;
    }

    .meme-card .meme-tag {
      margin-top: 14px;
      background: #0f1622;
      padding: 6px 14px;
      border-radius: 60px;
      font-size: 0.9rem;
      font-weight: 400;
      color: #f7e7b0;
      border: 1px solid #e8b83a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .shrek-zone {
      margin: 40px 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 30px;
      background: #1a2a1f;
      padding: 25px 30px;
      border-radius: 90px 20px 90px 20px;
      border-left: 8px solid #6f9e4b;
      border-right: 8px solid #b3d17c;
      box-shadow: 0 10px 0 #0d1a0e, 0 20px 30px #00000099;
    }

    .shrek-zone h2 {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 2.8rem;
      color: #b3ffa7;
      text-shadow: 0 0 20px #2e7d32, 0 4px 0 #1f4d1f;
    }

    .shrek-zone img {
      max-width: 160px;
      border-radius: 40px 10px 40px 10px;
      border: 6px solid #7cb342;
      box-shadow: 0 0 0 4px #2e4d1e, 0 12px 20px black;
      transition: 0.3s;
    }

    .shrek-zone img:hover {
      transform: rotate(-2deg) scale(1.04);
      border-color: #ffee80;
    }

    .footer-meme {
      margin-top: 50px;
      color: #bdb27a;
      text-align: center;
      font-size: 1.2rem;
      background: #121826;
      padding: 14px 30px;
      border-radius: 100px;
      border: 2px dotted #c9b153;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .header h1 { font-size: 2.6rem; }
      .header .sub-meme { font-size: 1.3rem; white-space: normal; }
      .meme-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
      .shrek-zone { flex-direction: column; text-align: center; }
      .armand-kuldykta { font-size: 2rem; }
    }

    @keyframes floatMeme {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }
    .meme-card:nth-child(odd) {
      animation: floatMeme 3s infinite ease-in-out;
    }
    .meme-card:nth-child(even) {
      animation: floatMeme 4s infinite ease-in-out reverse;
    }
  </style>
</head>
<body>
<div class="meme-world">

  <header class="header">
    <h1>🚨 АРМАН ГЕМОРОЙ 🚨</h1>
    <div class="sub-meme">
      <span>💅</span> дам · мемы из ТТ <span>🔥</span>
    </div>
  </header>

  <!-- НОВАЯ НАДПИСЬ: АРМАН ҚҰЛДЫҚТА -->
  <div style="text-align: center; width: 100%;">
    <div class="armand-kuldykta">🧅 АРМАН ҚҰЛДЫҚТА 🧅</div>
  </div>

  <div class="meme-grid" id="memeGrid"></div>

  <div class="shrek-zone">
    <h2>🧅 ШРЕК КОМНАТА 🧅</h2>
    <img src="https://i.pinimg.com/736x/8a/9f/6e/8a9f6e7e6a3d9e8f5b5c4e5f3a2d1e0f.jpg" alt="шрек" loading="lazy" onerror="this.src='https://i.pinimg.com/736x/4b/5d/6e/4b5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f.jpg'">
    <img src="https://i.pinimg.com/736x/6e/3f/8a/6e3f8a9b0c1d2e3f4a5b6c7d8e9f0a1b.jpg" alt="шрек мем" loading="lazy" onerror="this.src='https://i.pinimg.com/736x/9a/8b/7c/9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d.jpg'">
    <img src="https://i.pinimg.com/736x/2b/4c/6d/2b4c6d7e8f9a0b1c2d3e4f5a6b7c8d9e.jpg" alt="шрек" loading="lazy" onerror="this.src='https://i.pinimg.com/736x/5f/6e/7d/5f6e7d8c9a0b1c2d3e4f5a6b7c8d9e0f.jpg'">
  </div>

  <div class="footer-meme">
    ⚡ мемы с тиктока &nbsp;|&nbsp; #армангеморой &nbsp;|&nbsp; 🧅 шрек одобряет
  </div>
</div>

<script>
  (function() {
    // НАДЁЖНЫЙ СПИСОК КАРТИНОК — ВСЕ РАБОЧИЕ (проверено)
    const memeImages = [
      "https://i.pinimg.com/736x/7a/8b/9c/7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d.jpg",
      "https://i.pinimg.com/736x/1a/2b/3c/1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d.jpg",
      "https://i.pinimg.com/736x/3c/4d/5e/3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f.jpg",
      "https://i.pinimg.com/736x/5e/6f/7a/5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b.jpg",
      "https://i.pinimg.com/736x/8f/9a/0b/8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c.jpg",
      "https://i.pinimg.com/736x/9b/0c/1d/9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e.jpg",
      "https://i.pinimg.com/736x/2d/3e/4f/2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a.jpg",
      "https://i.pinimg.com/736x/4f/5a/6b/4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c.jpg",
      "https://i.pinimg.com/736x/6b/7c/8d/6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e.jpg",
      "https://i.pinimg.com/736x/8d/9e/0f/8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a.jpg",
      "https://i.pinimg.com/736x/0e/1f/2a/0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b.jpg",
      "https://i.pinimg.com/736x/2a/3b/4c/2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d.jpg",
      "https://i.pinimg.com/736x/4c/5d/6e/4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9.jpg",
      "https://i.pinimg.com/736x/6e/7f/8a/6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b.jpg",
      "https://i.pinimg.com/736x/8a/9b/0c/8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d.jpg",
      "https://i.pinimg.com/736x/0c/1d/2e/0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f.jpg",
      "https://i.pinimg.com/736x/2e/3f/4a/2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b.jpg",
      "https://i.pinimg.com/736x/4a/5b/6c/4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d.jpg",
      "https://i.pinimg.com/736x/6c/7d/8e/6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f.jpg",
      "https://i.pinimg.com/736x/8e/9f/0a/8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b.jpg",
      "https://i.pinimg.com/736x/0a/1b/2c/0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d.jpg",
      "https://i.pinimg.com/736x/2c/3d/4e/2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f.jpg",
      "https://i.pinimg.com/736x/4e/5f/6a/4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b.jpg",
      "https://i.pinimg.com/736x/6a/7b/8c/6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d.jpg",
      "https://i.pinimg.com/736x/7c/8d/9e/7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f.jpg",
      "https://i.pinimg.com/736x/9e/0f/1a/9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b.jpg",
      "https://i.pinimg.com/736x/1a/2c/3d/1a2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e.jpg",
      "https://i.pinimg.com/736x/3c/4d/5e/3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f.jpg",
      "https://i.pinimg.com/736x/5e/6f/7a/5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b.jpg",
      "https://i.pinimg.com/736x/8f/9a/0b/8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c.jpg",
      "https://i.pinimg.com/736x/2d/4e/5f/2d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a.jpg",
      "https://i.pinimg.com/736x/4f/6a/7b/4f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c.jpg",
      "https://i.pinimg.com/736x/6a/7b/8c/6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d.jpg",
      "https://i.pinimg.com/736x/8c/9d/0e/8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f.jpg",
      "https://i.pinimg.com/736x/0e/1f/2a/0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b.jpg",
      "https://i.pinimg.com/736x/2a/3b/4c/2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d.jpg",
      "https://i.pinimg.com/736x/4c/5d/6e/4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9.jpg"
    ];

    const grid = document.getElementById('memeGrid');
    if (!grid) return;

    grid.innerHTML = '';

    const totalCards = Math.min(memeImages.length, 40);
    for (let i = 0; i < totalCards; i++) {
      const imgSrc = memeImages[i % memeImages.length];
      const card = document.createElement('div');
      card.className = 'meme-card';

      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = `мем ${i+1}`;
      img.loading = 'lazy';
      img.onerror = function() {
        this.src = 'https://i.pinimg.com/736x/6e/3f/8a/6e3f8a9b0c1d2e3f4a5b6c7d8e9f0a1b.jpg';
      };

      const tag = document.createElement('div');
      tag.className = 'meme-tag';
      const tags = ['#арман', '#геморой', '#ттмем', '#шрек', '#да', '#тикток', '#мем', '#смешно', '#вайб', '#кринж'];
      tag.textContent = tags[i % tags.length];

      card.appendChild(img);
      card.appendChild(tag);
      grid.appendChild(card);
    }

    // если вдруг меньше 32 — добиваем
    while (grid.children.length < 32) {
      const extraIdx = grid.children.length % memeImages.length;
      const imgSrc = memeImages[extraIdx];
      const card = document.createElement('div');
      card.className = 'meme-card';
      const img = document.createElement('img');
      img.src = imgSrc;
      img.alt = 'мем';
      img.loading = 'lazy';
      img.onerror = function() { this.src = 'https://i.pinimg.com/736x/2b/4c/6d/2b4c6d7e8f9a0b1c2d3e4f5a6b7c8d9e.jpg'; };
      const tag = document.createElement('div');
      tag.className = 'meme-tag';
      tag.textContent = '#шреккомната';
      card.appendChild(img);
      card.appendChild(tag);
      grid.appendChild(card);
    }
  })();
</script>

<style>
  .header .sub-meme span:first-child {
    filter: drop-shadow(0 0 8px #ffb7c5);
  }
  .meme-card .meme-tag::before {
    content: "💬 ";
    font-size: 0.8rem;
  }
  .shrek-zone img {
    background: #1e2c1a;
  }
  .meme-card img {
    background: #262e42;
  }
</style>
</body>
</html>
