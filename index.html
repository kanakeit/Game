<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Арман Геморой · Қазақша маттар</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik+Vinyl&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0c1a 0%, #1a1f2f 100%);
      min-height: 100vh;
      font-family: 'Fredoka One', cursive, sans-serif;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .meme-world {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 240, 200, 0.06);
      backdrop-filter: blur(3px);
      border-radius: 70px 70px 40px 40px;
      padding: 30px 30px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #f7d44a inset;
      border: 1px solid #f8e47b;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 18px 30px;
      margin-bottom: 30px;
      background: #141a28;
      padding: 20px 30px;
      border-radius: 100px;
      box-shadow: 0 8px 0 #0a0c14, 0 12px 30px rgba(0,0,0,0.5);
      border-bottom: 4px solid #f9d342;
    }

    .header h1 {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 3.6rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #feda75, #ffb347, #fd7e14);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px #ffae42, 0 0 6px #ff7b00;
      text-align: center;
    }

    .header .sub-meme {
      background: #232b3b;
      padding: 12px 28px;
      border-radius: 60px;
      color: #ffeeaa;
      font-size: 1.6rem;
      border: 2px dashed #f1c40f;
      box-shadow: 0 0 0 3px #1f2636;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .header .sub-meme span {
      font-size: 2rem;
    }

    .armand-kuldykta {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 3rem;
      background: linear-gradient(135deg, #ff2d2d, #ff6b6b, #ffb347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px #ff0000, 0 4px 0 #4a0f0f;
      letter-spacing: 4px;
      text-align: center;
      margin: -5px 0 30px 0;
      padding: 12px 30px;
      background-color: #0f1422;
      border-radius: 80px;
      display: inline-block;
      border: 3px solid #ff2d2d;
      box-shadow: 0 0 0 4px #1f1f2e, 0 0 30px #ff000066;
    }

    .insult-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 22px 20px;
      margin: 30px 0 25px;
    }

    .insult-card {
      background: #1e2537;
      border-radius: 40px 20px 40px 20px;
      padding: 22px 18px 20px;
      box-shadow: 0 12px 0 #0e121d, 0 10px 25px rgba(0,0,0,0.7);
      border: 2px solid #ff2d2d;
      transition: 0.15s ease;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 190px;
      justify-content: center;
      background: linear-gradient(145deg, #1e2537, #2a1f2f);
    }

    .insult-card:hover {
      transform: scale(1.02) translateY(-5px);
      border-color: #ff5555;
      box-shadow: 0 14px 0 #0e121d, 0 20px 30px #ff000033;
    }

    .insult-text {
      font-size: 1.7rem;
      color: #f7e7b0;
      font-family: 'Fredoka One', cursive;
      line-height: 1.4;
      word-break: break-word;
    }

    .insult-emoji {
      font-size: 3rem;
      filter: drop-shadow(0 0 12px #ff2d2d);
    }

    .insult-tag {
      background: #0f1622;
      padding: 5px 16px;
      border-radius: 60px;
      font-size: 0.9rem;
      color: #ffb3b3;
      border: 1px solid #ff2d2d;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .shrek-zone {
      margin: 40px 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 20px 30px;
      background: #1a2a1f;
      padding: 25px 30px;
      border-radius: 90px 20px 90px 20px;
      border-left: 8px solid #6f9e4b;
      border-right: 8px solid #b3d17c;
      box-shadow: 0 10px 0 #0d1a0e, 0 20px 30px #00000099;
    }

    .shrek-zone h2 {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 2.4rem;
      color: #b3ffa7;
      text-shadow: 0 0 20px #2e7d32, 0 4px 0 #1f4d1f;
    }

    .shrek-zone .shrek-text {
      font-size: 1.6rem;
      color: #d4e8b0;
      background: #0f1f12;
      padding: 12px 28px;
      border-radius: 60px;
      border: 2px solid #8bc34a;
      box-shadow: 0 0 20px #3a6b2d;
      font-family: 'Fredoka One', cursive;
    }

    .footer-meme {
      margin-top: 50px;
      color: #bdb27a;
      text-align: center;
      font-size: 1.2rem;
      background: #121826;
      padding: 14px 30px;
      border-radius: 100px;
      border: 2px dotted #ff2d2d;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .header h1 { font-size: 2.4rem; }
      .header .sub-meme { font-size: 1.2rem; white-space: normal; }
      .insult-grid { grid-template-columns: 1fr; }
      .shrek-zone { flex-direction: column; text-align: center; }
      .armand-kuldykta { font-size: 2rem; }
    }

    @keyframes floatCard {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .insult-card:nth-child(odd) {
      animation: floatCard 3.2s infinite ease-in-out;
    }
    .insult-card:nth-child(even) {
      animation: floatCard 4.5s infinite ease-in-out reverse;
    }
  </style>
</head>
<body>
<div class="meme-world">

  <header class="header">
    <h1>🚨 АРМАН ГЕМОРОЙ 🚨</h1>
    <div class="sub-meme">
      <span>💅</span> дам · қазақша маттар <span>🔥</span>
    </div>
  </header>

  <div style="text-align: center; width: 100%;">
    <div class="armand-kuldykta">🔥 АРМАН ҚҰЛДЫҚТА 🔥</div>
  </div>

  <!-- Сетка с матами и оскорблениями на казахском -->
  <div class="insult-grid" id="insultGrid"></div>

  <!-- Шрек-зона с казахскими приколами -->
  <div class="shrek-zone">
    <h2>🧅 ШРЕК АЙТТЫ 🧅</h2>
    <div class="shrek-text">«Арман — қотақтың патшасы»</div>
    <div class="shrek-text">«Арманның ешагы да кодыгы»</div>
    <div class="shrek-text">«Арман — батпақтың қотақ басы»</div>
  </div>

  <div class="footer-meme">
    ⚡ тикток-пранк &nbsp;|&nbsp; #армангеморой &nbsp;|&nbsp; 🧅 шрек куә
  </div>
</div>

<script>
  (function() {
    // ҚАТТЫ ҚАЗАҚША МАТТАР МЕН ОСКОРБЛЕНИЯ
    const insults = [
      { text: "Арман — қотақтың кодыгы", emoji: "🍆" },
      { text: "Арман ешак, ешак, ешак!", emoji: "🐴" },
      { text: "Арман — геморройлы қотақ", emoji: "💩" },
      { text: "Арманның басы — қотақ басы", emoji: "🧠" },
      { text: "Арман — кодыгы жоқ ешак", emoji: "🫏" },
      { text: "Арман — қотақ патшасы", emoji: "👑" },
      { text: "Арман — шизоидті ешак", emoji: "🌀" },
      { text: "Арманның миы — қотақ", emoji: "🧠" },
      { text: "Арман — құлдықтағы қотақ", emoji: "⛓️" },
      { text: "Арман ешагы — геморройлы", emoji: "🐴" },
      { text: "Арман — қотақ мемі", emoji: "🔥" },
      { text: "Арман — батпақтың қотақ басы", emoji: "🌿" },
      { text: "Арман — кодыгы жоқ пранк", emoji: "🎭" },
      { text: "Арман — қотақтың легендасы", emoji: "📖" },
      { text: "Арман ешак — ол факт", emoji: "📌" },
      { text: "Арман — геморройлы ешак", emoji: "💢" },
      { text: "Арманның қотагы — кринж", emoji: "😂" },
      { text: "Арман — құлдықтағы ешак", emoji: "⛓️" },
      { text: "Арман — қотақтың ағасы", emoji: "🧔" },
      { text: "Арман — батпақ ешагы", emoji: "🟢" },
      { text: "Арман — қотақ генералы", emoji: "⭐" },
      { text: "Арман ешак — 24/7", emoji: "🕒" },
      { text: "Арман — кодыгы жок қотақ", emoji: "❌" },
      { text: "Арман — геморройлы құл", emoji: "💀" },
      { text: "Арман — қотақтың мемі", emoji: "📱" },
      { text: "Арман — ешак патшасы", emoji: "🐴" },
      { text: "Арман — қотақ кринжы", emoji: "🤡" },
      { text: "Арман — батпақтың кодыгы", emoji: "🧅" },
      { text: "Арман — құлдықтағы мем", emoji: "🖼️" },
      { text: "Арман ешак — ол сенім", emoji: "🙏" },
      { text: "Арман — қотақтың басшысы", emoji: "👔" },
      { text: "Арман — геморройлы мем", emoji: "💩" },
      { text: "Арман — қотақ мәсіхі", emoji: "✝️" },
      { text: "Арман ешак — түпкілікті", emoji: "🔚" }
    ];

    const grid = document.getElementById('insultGrid');
    if (!grid) return;
    grid.innerHTML = '';

    insults.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'insult-card';

      const emojiSpan = document.createElement('div');
      emojiSpan.className = 'insult-emoji';
      emojiSpan.textContent = item.emoji;

      const textDiv = document.createElement('div');
      textDiv.className = 'insult-text';
      textDiv.textContent = item.text;

      const tag = document.createElement('div');
      tag.className = 'insult-tag';
      const tags = ['#арман', '#қотақ', '#ешак', '#кодыгы', '#геморрой', '#шрек', '#мем', '#тикток', '#пранк', '#құлдық'];
      tag.textContent = tags[index % tags.length];

      card.appendChild(emojiSpan);
      card.appendChild(textDiv);
      card.appendChild(tag);
      grid.appendChild(card);
    });

    // если мало — добавляем ещё
    while (grid.children.length < 30) {
      const idx = grid.children.length % insults.length;
      const item = insults[idx];
      const card = document.createElement('div');
      card.className = 'insult-card';

      const emojiSpan = document.createElement('div');
      emojiSpan.className = 'insult-emoji';
      emojiSpan.textContent = item.emoji;

      const textDiv = document.createElement('div');
      textDiv.className = 'insult-text';
      textDiv.textContent = item.text + ' (ремикс)';

      const tag = document.createElement('div');
      tag.className = 'insult-tag';
      tag.textContent = '#арманкодыгы';

      card.appendChild(emojiSpan);
      card.appendChild(textDiv);
      card.appendChild(tag);
      grid.appendChild(card);
    }
  })();
</script>

</body>
</html>
