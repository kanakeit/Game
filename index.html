<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>💖 Kana + Ayau</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ============================================================
           ГЛОБАЛЬНЫЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            padding: 16px;
            position: relative;
            transition: background 0.8s ease, background-image 0.8s ease;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
        }

        /* Затемнение для читаемости */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.50);
            backdrop-filter: blur(3px);
            z-index: 0;
            pointer-events: none;
        }

        /* Фоновые летящие сердечки */
        .falling-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .heart-particle {
            position: absolute;
            font-size: 16px;
            animation: fall linear infinite;
            opacity: 0.10;
        }
        @keyframes fall {
            0% { transform: translateY(-50px) rotate(0deg); opacity: 0.08; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* ============================================================
           ОСНОВНАЯ КАРТОЧКА
           ============================================================ */
        .love-card {
            position: relative;
            z-index: 1;
            max-width: 440px;
            width: 100%;
            padding: 32px 28px 28px;
            border-radius: 48px;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(32px) saturate(1.4);
            border: 0.5px solid rgba(255, 255, 255, 0.04);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
            text-align: center;
            transition: all 0.5s ease;
        }

        /* ============================================================
           ЗАГОЛОВОК — ТЕКСТ НЕПРОЗРАЧНЫЙ
           ============================================================ */
        .love-header {
            margin-bottom: 20px;
        }
        .love-header .hearts-title {
            font-size: 34px;
            animation: pulseHearts 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes pulseHearts {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .love-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 900;
            color: #ffffff; /* НЕПРОЗРАЧНЫЙ */
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .love-header h1 .name {
            background: linear-gradient(135deg, #ff6b9d, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .love-header .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4); /* НЕПРОЗРАЧНЫЙ, но приглушённый */
            letter-spacing: 3px;
            margin-top: 4px;
            font-weight: 400;
        }

        /* ============================================================
           СЧЁТЧИК — ТЕКСТ НЕПРОЗРАЧНЫЙ
           ============================================================ */
        .days-counter {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 32px;
            padding: 22px 20px 18px;
            border: 0.5px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 18px;
        }
        .days-counter .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4); /* НЕПРОЗРАЧНЫЙ */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 400;
        }
        .days-counter .number {
            font-family: 'Playfair Display', serif;
            font-size: 54px;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }
        .days-counter .stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 6px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.3); /* НЕПРОЗРАЧНЫЙ */
            font-weight: 400;
        }
        .days-counter .stats span {
            font-weight: 600;
            color: rgba(255, 255, 255, 0.4);
        }
        .days-counter .since {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25); /* НЕПРОЗРАЧНЫЙ */
            margin-top: 6px;
            letter-spacing: 0.5px;
            font-weight: 300;
        }

        /* ============================================================
           НАСТРОЙКИ — ТЕКСТ НЕПРОЗРАЧНЫЙ
           ============================================================ */
        .settings-toggle {
            margin-bottom: 10px;
        }
        .settings-toggle button {
            padding: 8px 24px;
            border-radius: 30px;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5); /* НЕПРОЗРАЧНЫЙ */
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .settings-toggle button:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
        }

        .settings-panel {
            display: none;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 28px;
            padding: 18px 20px 14px;
            border: 0.5px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 16px;
            gap: 14px;
            flex-direction: column;
        }
        .settings-panel.open { display: flex; }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
        }
        .setting-row label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5); /* НЕПРОЗРАЧНЫЙ */
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .setting-row input[type="date"] {
            padding: 6px 14px;
            border-radius: 24px;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }
        .setting-row input[type="date"]:focus {
            border-color: rgba(255, 105, 180, 0.2);
        }
        .setting-row input[type="text"] {
            padding: 4px 12px;
            border-radius: 24px;
            border: 0.5px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 70px;
            text-align: center;
            transition: all 0.3s;
        }
        .setting-row input[type="text"]:focus {
            border-color: rgba(255, 105, 180, 0.2);
        }

        /* ============================================================
           ТЕМЫ
           ============================================================ */
        .theme-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .theme-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            position: relative;
            overflow: hidden;
        }
        .theme-btn:hover {
            transform: scale(1.08);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .theme-btn.active {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 105, 180, 0.15);
            transform: scale(1.05);
        }
        .theme-btn .theme-label {
            position: absolute;
            bottom: 4px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 8px;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.3);
            padding: 1px 8px;
            border-radius: 10px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }

        /* ============================================================
           ФУТЕР
           ============================================================ */
        .footer {
            margin-top: 14px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.08); /* ЧУТЬ ВИДЕН */
            letter-spacing: 0.5px;
            padding-top: 12px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.01);
        }
        .footer .heart {
            color: rgba(255, 105, 180, 0.10);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (max-width: 480px) {
            .love-card { padding: 24px 18px 20px; border-radius: 36px; }
            .love-header h1 { font-size: 24px; }
            .days-counter .number { font-size: 40px; }
            .theme-btn { width: 44px; height: 44px; }
            .setting-row { flex-wrap: wrap; gap: 4px; }
        }

        @media (max-width: 380px) {
            .love-card { padding: 18px 14px 16px; border-radius: 28px; }
            .love-header h1 { font-size: 20px; }
            .days-counter .number { font-size: 32px; }
            .theme-btn { width: 38px; height: 38px; border-radius: 12px; }
        }
    </style>
</head>
<body>

    <!-- Фоновые сердечки -->
    <div class="falling-hearts" id="fallingHearts"></div>

    <!-- ============================================================
    ОСНОВНАЯ КАРТОЧКА
    ============================================================ -->
    <div class="love-card">

        <!-- ЗАГОЛОВОК -->
        <div class="love-header">
            <div class="hearts-title">💖</div>
            <h1><span class="name" id="name1">Kana</span> + <span class="name" id="name2">Ayau</span></h1>
            <div class="subtitle">✦ НАША ИСТОРИЯ ЛЮБВИ ✦</div>
        </div>

        <!-- СЧЁТЧИК -->
        <div class="days-counter">
            <div class="label">❤️ Дней вместе</div>
            <div class="number" id="daysNumber">0</div>
            <div class="stats">
                <span id="weeksCount">0 недель</span>
                <span id="monthsCount">0 месяцев</span>
            </div>
            <div class="since" id="sinceDate">с 12 июня 2026 г.</div>
        </div>

        <!-- НАСТРОЙКИ -->
        <div class="settings-toggle">
            <button id="settingsToggleBtn">⚙️ Настройки</button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row">
                <label>📅 Дата начала</label>
                <input type="date" id="startDateInput" />
            </div>
            <div class="setting-row">
                <label>💑 Ваши имена</label>
                <div style="display:flex;gap:6px;align-items:center;">
                    <input type="text" id="name1Input" placeholder="Kana" />
                    <span style="color:rgba(255,255,255,0.05);">+</span>
                    <input type="text" id="name2Input" placeholder="Ayau" />
                </div>
            </div>
            <div class="setting-row" style="flex-direction:column;align-items:stretch;gap:6px;">
                <label style="text-align:center;">🎨 Тема</label>
                <div class="theme-grid" id="themeGrid"></div>
            </div>
        </div>

        <!-- ФУТЕР -->
        <div class="footer">
            <span class="heart">❤️</span>
            <span>Создано с любовью для нас</span>
            <span class="heart">❤️</span>
        </div>
    </div>

    <!-- ============================================================
    JAVASCRIPT
    ============================================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // 1. ТЕМЫ С КАРТИНКАМИ
            // ============================================================

            const themes = [{
                id: 'sunset',
                name: '🌅 Закат',
                url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80'
            }, {
                id: 'sakura',
                name: '🌸 Сакура',
                url: 'https://images.unsplash.com/photo-1522383225653-ed111181a951?w=800&q=80'
            }, {
                id: 'ocean',
                name: '🌊 Океан',
                url: 'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=800&q=80'
            }, {
                id: 'stars',
                name: '⭐ Звёзды',
                url: 'https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=800&q=80'
            }, {
                id: 'forest',
                name: '🌿 Лес',
                url: 'https://images.unsplash.com/photo-1518495973542-4542c06a5843?w=800&q=80'
            }, {
                id: 'lavender',
                name: '💜 Лаванда',
                url: 'https://images.unsplash.com/photo-1503280537630-53a3b7f54c62?w=800&q=80'
            }, {
                id: 'cherry',
                name: '🌸 Цветение',
                url: 'https://images.unsplash.com/photo-1522383225653-ed111181a951?w=800&q=80'
            }, {
                id: 'mountains',
                name: '🏔️ Горы',
                url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&q=80'
            }, {
                id: 'sunrise',
                name: '☀️ Рассвет',
                url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80'
            }, {
                id: 'night',
                name: '🌙 Ночь',
                url: 'https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=800&q=80'
            }];

            const body = document.body;
            const themeGrid = document.getElementById('themeGrid');

            let currentTheme = localStorage.getItem('loveTheme') || themes[0].id;

            function applyTheme(themeId) {
                const theme = themes.find(t => t.id === themeId);
                if (!theme) return;
                body.style.backgroundImage = `url('${theme.url}')`;
                body.style.backgroundSize = 'cover';
                body.style.backgroundPosition = 'center';
                body.style.backgroundRepeat = 'no-repeat';
                currentTheme = themeId;
                localStorage.setItem('loveTheme', themeId);

                document.querySelectorAll('.theme-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.theme === themeId);
                });
            }

            themes.forEach(theme => {
                const btn = document.createElement('button');
                btn.className = 'theme-btn';
                btn.dataset.theme = theme.id;
                btn.style.backgroundImage = `url('${theme.url}')`;
                btn.innerHTML = `<span class="theme-label">${theme.name}</span>`;
                btn.addEventListener('click', () => applyTheme(theme.id));
                themeGrid.appendChild(btn);
            });

            applyTheme(currentTheme);

            // ============================================================
            // 2. ФОНОВЫЕ СЕРДЕЧКИ
            // ============================================================

            function createHearts() {
                const container = document.getElementById('fallingHearts');
                const emojis = ['❤️', '💖', '💕', '💗', '💓', '💘', '💝'];
                for (let i = 0; i < 18; i++) {
                    const el = document.createElement('span');
                    el.className = 'heart-particle';
                    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    el.style.left = Math.random() * 100 + '%';
                    el.style.fontSize = (10 + Math.random() * 16) + 'px';
                    el.style.animationDuration = (14 + Math.random() * 22) + 's';
                    el.style.animationDelay = (Math.random() * 18) + 's';
                    container.appendChild(el);
                }
            }
            createHearts();

            // ============================================================
            // 3. СЧЁТЧИК ДНЕЙ
            // ============================================================

            const START_DATE = new Date(2026, 5, 12);

            const daysNumber = document.getElementById('daysNumber');
            const weeksSpan = document.getElementById('weeksCount');
            const monthsSpan = document.getElementById('monthsCount');
            const sinceDate = document.getElementById('sinceDate');
            const startDateInput = document.getElementById('startDateInput');

            const year = START_DATE.getFullYear();
            const month = String(START_DATE.getMonth() + 1).padStart(2, '0');
            const day = String(START_DATE.getDate()).padStart(2, '0');
            startDateInput.value = `${year}-${month}-${day}`;

            function updateCounter() {
                const start = new Date(startDateInput.value);
                const now = new Date();
                const diff = now - start;
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const weeks = Math.floor(days / 7);
                const months = Math.floor(days / 30.44);

                daysNumber.textContent = days >= 0 ? days : 0;
                weeksSpan.textContent = (weeks >= 0 ? weeks : 0) + ' недель';
                monthsSpan.textContent = (months >= 0 ? months : 0) + ' месяцев';

                sinceDate.textContent = `с ${start.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' })}`;
            }

            updateCounter();

            startDateInput.addEventListener('change', updateCounter);

            // ============================================================
            // 4. ИМЕНА
            // ============================================================

            const name1El = document.getElementById('name1');
            const name2El = document.getElementById('name2');
            const name1Input = document.getElementById('name1Input');
            const name2Input = document.getElementById('name2Input');

            function loadNames() {
                const n1 = localStorage.getItem('loveName1') || 'Kana';
                const n2 = localStorage.getItem('loveName2') || 'Ayau';
                name1El.textContent = n1;
                name2El.textContent = n2;
                name1Input.value = n1;
                name2Input.value = n2;
            }
            loadNames();

            name1Input.addEventListener('change', function() {
                const val = this.value.trim() || 'Kana';
                localStorage.setItem('loveName1', val);
                name1El.textContent = val;
            });
            name2Input.addEventListener('change', function() {
                const val = this.value.trim() || 'Ayau';
                localStorage.setItem('loveName2', val);
                name2El.textContent = val;
            });

            // ============================================================
            // 5. НАСТРОЙКИ
            // ============================================================

            const settingsToggleBtn = document.getElementById('settingsToggleBtn');
            const settingsPanel = document.getElementById('settingsPanel');

            settingsToggleBtn.addEventListener('click', () => {
                settingsPanel.classList.toggle('open');
                settingsToggleBtn.textContent = settingsPanel.classList.contains('open') ? '⚙️ Закрыть' : '⚙️ Настройки';
            });

            console.log('💖 Kana + Ayau — Виджет любви загружен!');
            console.log('❤️ Дней вместе:', daysNumber.textContent);

        })();
    </script>

</body>
</html>
