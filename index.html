<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Арман Геморой · Мемные оскорбления</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Rubik+Vinyl&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0b0c1a 0%, #1a1f2f 100%);
      min-height: 100vh;
      font-family: 'Fredoka One', cursive, sans-serif;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .meme-world {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 240, 200, 0.06);
      backdrop-filter: blur(3px);
      border-radius: 70px 70px 40px 40px;
      padding: 30px 30px 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px #f7d44a inset;
      border: 1px solid #f8e47b;
    }

    .header {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 18px 30px;
      margin-bottom: 30px;
      background: #141a28;
      padding: 20px 30px;
      border-radius: 100px;
      box-shadow: 0 8px 0 #0a0c14, 0 12px 30px rgba(0,0,0,0.5);
      border-bottom: 4px solid #f9d342;
    }

    .header h1 {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 3.6rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #feda75, #ffb347, #fd7e14);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px #ffae42, 0 0 6px #ff7b00;
      text-align: center;
    }

    .header .sub-meme {
      background: #232b3b;
      padding: 12px 28px;
      border-radius: 60px;
      color: #ffeeaa;
      font-size: 1.6rem;
      border: 2px dashed #f1c40f;
      box-shadow: 0 0 0 3px #1f2636;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .header .sub-meme span {
      font-size: 2rem;
    }

    .armand-kuldykta {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 3rem;
      background: linear-gradient(135deg, #ffb347, #ff6b6b, #ff2d2d);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px #ff2222, 0 4px 0 #4a0f0f;
      letter-spacing: 4px;
      text-align: center;
      margin: -5px 0 30px 0;
      padding: 12px 30px;
      background-color: #0f1422;
      border-radius: 80px;
      display: inline-block;
      border: 3px solid #f1c40f;
      box-shadow: 0 0 0 4px #1f1f2e;
    }

    .insult-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 22px 20px;
      margin: 30px 0 25px;
    }

    .insult-card {
      background: #1e2537;
      border-radius: 40px 20px 40px 20px;
      padding: 22px 18px 20px;
      box-shadow: 0 12px 0 #0e121d, 0 10px 25px rgba(0,0,0,0.7);
      border: 2px solid #f1c40f;
      transition: 0.15s ease;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      min-height: 180px;
      justify-content: center;
    }

    .insult-card:hover {
      transform: scale(1.02) translateY(-5px);
      border-color: #ffdd55;
      box-shadow: 0 14px 0 #0e121d, 0 20px 30px #000000aa;
    }

    .insult-text {
      font-size: 1.6rem;
      color: #f7e7b0;
      font-family: 'Fredoka One', cursive;
      line-height: 1.4;
      word-break: break-word;
    }

    .insult-emoji {
      font-size: 2.8rem;
      filter: drop-shadow(0 0 12px #f1c40f);
    }

    .insult-tag {
      background: #0f1622;
      padding: 5px 16px;
      border-radius: 60px;
      font-size: 0.9rem;
      color: #f7e7b0;
      border: 1px solid #e8b83a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .shrek-zone {
      margin: 40px 0 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 25px 40px;
      background: #1a2a1f;
      padding: 25px 30px;
      border-radius: 90px 20px 90px 20px;
      border-left: 8px solid #6f9e4b;
      border-right: 8px solid #b3d17c;
      box-shadow: 0 10px 0 #0d1a0e, 0 20px 30px #00000099;
    }

    .shrek-zone h2 {
      font-family: 'Rubik Vinyl', cursive;
      font-size: 2.6rem;
      color: #b3ffa7;
      text-shadow: 0 0 20px #2e7d32, 0 4px 0 #1f4d1f;
    }

    .shrek-zone .shrek-text {
      font-size: 1.8rem;
      color: #d4e8b0;
      background: #0f1f12;
      padding: 12px 30px;
      border-radius: 60px;
      border: 2px solid #8bc34a;
      box-shadow: 0 0 20px #3a6b2d;
    }

    .footer-meme {
      margin-top: 50px;
      color: #bdb27a;
      text-align: center;
      font-size: 1.2rem;
      background: #121826;
      padding: 14px 30px;
      border-radius: 100px;
      border: 2px dotted #c9b153;
      display: inline-block;
    }

    @media (max-width: 700px) {
      .header h1 { font-size: 2.4rem; }
      .header .sub-meme { font-size: 1.2rem; white-space: normal; }
      .insult-grid { grid-template-columns: 1fr; }
      .shrek-zone { flex-direction: column; text-align: center; }
      .armand-kuldykta { font-size: 2rem; }
    }

    @keyframes floatCard {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .insult-card:nth-child(odd) {
      animation: floatCard 3.2s infinite ease-in-out;
    }
    .insult-card:nth-child(even) {
      animation: floatCard 4.5s infinite ease-in-out reverse;
    }
  </style>
</head>
<body>
<div class="meme-world">

  <header class="header">
    <h1>🚨 АРМАН ГЕМОРОЙ 🚨</h1>
    <div class="sub-meme">
      <span>💅</span> дам · мемные оскорбления <span>🔥</span>
    </div>
  </header>

  <div style="text-align: center; width: 100%;">
    <div class="armand-kuldykta">🧅 АРМАН ҚҰЛДЫҚТА 🧅</div>
  </div>

  <!-- Сетка с мемными оскорблениями -->
  <div class="insult-grid" id="insultGrid"></div>

  <!-- Шрек-зона с текстовыми приколами -->
  <div class="shrek-zone">
    <h2>🧅 ШРЕК СКАЗАЛ 🧅</h2>
    <div class="shrek-text">«Арман, ты как лук — у тебя слои кринжа»</div>
    <div class="shrek-text">«У Армана геморой даже в душе»</div>
    <div class="shrek-text">«Арман — болотный король позора»</div>
  </div>

  <div class="footer-meme">
    ⚡ тикток-приколы &nbsp;|&nbsp; #армангеморой &nbsp;|&nbsp; 🧅 шрек одобряет
  </div>
</div>

<script>
  (function() {
    // АРМИЯ МЕМНЫХ ОСКОРБЛЕНИЙ ДЛЯ АРМАНА
    const insults = [
      { text: "Арман — король геморроя 👑", emoji: "💩" },
      { text: "У Армана IQ как у табуретки 🪑", emoji: "🧠" },
      { text: "Арман — живой кринж-компиляция 🤡", emoji: "🔥" },
      { text: "Арман думал, что Шрек — это про него", emoji: "🧅" },
      { text: "Арман: 'я краш' — все: 'ты геморой'", emoji: "😭" },
      { text: "Арман в зеркало: 'кто это?' — зеркало: 'кринж'", emoji: "🪞" },
      { text: "У Армана даже болото Шрека чище", emoji: "🌿" },
      { text: "Арман — челлендж: не будь геморроем (провал)", emoji: "📉" },
      { text: "Арман: 'я альфа' — все: 'ты геморрой-бета'", emoji: "🐺" },
      { text: "Арман сдал ГТО по кринжу — золото", emoji: "🥇" },
      { text: "Арман — причина, почему у Шрека болото воняет", emoji: "💨" },
      { text: "Арман: 'я мем' — мемы: 'мы не про тебя'", emoji: "😂" },
      { text: "Арман — главный герой тиктока для зумеров", emoji: "📱" },
      { text: "Арман геморрой — диагноз, а не имя", emoji: "🏥" },
      { text: "Арман: 'я красавчик' — зеркало треснуло", emoji: "💔" },
      { text: "Арман — живой пранк над самим собой", emoji: "🎭" },
      { text: "Арман — база для мемов без фото", emoji: "🖼️" },
      { text: "Арман — болотный хозяин позора", emoji: "🧅" },
      { text: "Арман: 'дайте мне шрека' — шрек: 'не, я пас'", emoji: "🙅" },
      { text: "Арман — легенда, но только среди геморроя", emoji: "📖" },
      { text: "Арман — чел, который сделал кринж искусством", emoji: "🎨" },
      { text: "Арман — тикток-звезда, но в чёрном списке", emoji: "⭐" },
      { text: "Арман: 'я крутой' — все: 'ты геморройный'", emoji: "🌀" },
      { text: "Арман — причина, почему Шрек ушёл в лес", emoji: "🌲" },
      { text: "Арман — живой мем без картинки", emoji: "📝" },
      { text: "Арман — геморрой в квадрате", emoji: "🔲" },
      { text: "Арман — болотный дух позора", emoji: "👻" },
      { text: "Арман: 'я уникален' — все: 'как геморрой'", emoji: "🦄" },
      { text: "Арман — пранк, который никто не понял", emoji: "🤷" },
      { text: "Арман — король кринжа и геморроя", emoji: "👑" },
      { text: "Арман — даже Шрек над ним смеётся", emoji: "😂" },
      { text: "Арман — человек-геморрой, мем-легенда", emoji: "🧬" },
      { text: "Арман: 'я звезда' — звёзды погасли", emoji: "🌠" }
    ];

    const grid = document.getElementById('insultGrid');
    if (!grid) return;
    grid.innerHTML = '';

    // Добавляем все оскорбления
    insults.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'insult-card';

      const emojiSpan = document.createElement('div');
      emojiSpan.className = 'insult-emoji';
      emojiSpan.textContent = item.emoji;

      const textDiv = document.createElement('div');
      textDiv.className = 'insult-text';
      textDiv.textContent = item.text;

      const tag = document.createElement('div');
      tag.className = 'insult-tag';
      const tags = ['#арман', '#геморой', '#кринж', '#шрек', '#мем', '#тикток', '#пранк', '#смешно', '#вайб', '#позор'];
      tag.textContent = tags[index % tags.length];

      card.appendChild(emojiSpan);
      card.appendChild(textDiv);
      card.appendChild(tag);
      grid.appendChild(card);
    });

    // Если нужно больше — дублируем с новыми тегами
    while (grid.children.length < 30) {
      const idx = grid.children.length % insults.length;
      const item = insults[idx];
      const card = document.createElement('div');
      card.className = 'insult-card';

      const emojiSpan = document.createElement('div');
      emojiSpan.className = 'insult-emoji';
      emojiSpan.textContent = item.emoji;

      const textDiv = document.createElement('div');
      textDiv.className = 'insult-text';
      textDiv.textContent = item.text + ' (ремикс)';

      const tag = document.createElement('div');
      tag.className = 'insult-tag';
      tag.textContent = '#армангеморой';

      card.appendChild(emojiSpan);
      card.appendChild(textDiv);
      card.appendChild(tag);
      grid.appendChild(card);
    }
  })();
</script>

</body>
</html>
